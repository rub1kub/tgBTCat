[package]
name = "tg-btc-cat"
description = "TG BTC Cat DAO jetton contracts on TON"
version = "0.1.0"
license = "MIT"

[toolchain]
acton = "1.0.0"

[contracts.TgBtcCatDao]
display-name = "TG BTC Cat DAO"
src = "contracts/TgBtcCatDao.tolk"
depends = []

[contracts.TgBtcCatJettonMaster]
display-name = "TG BTC Cat Jetton Master"
src = "contracts/TgBtcCatJettonMaster.tolk"
depends = ["TgBtcCatJettonWallet"]

[contracts.TgBtcCatJettonWallet]
display-name = "TG BTC Cat Jetton Wallet"
src = "contracts/TgBtcCatJettonWallet.tolk"
depends = []

[contracts.TgBtcCatFeeController]
display-name = "TG BTC Cat Fee Controller"
src = "contracts/TgBtcCatFeeController.tolk"
depends = []

[contracts.TgBtcCatWalletFeeRegistry]
display-name = "TG BTC Cat Wallet Fee Registry"
src = "contracts/TgBtcCatWalletFeeRegistry.tolk"
depends = []

[contracts.TgBtcCatDexRegistry]
display-name = "TG BTC Cat DEX Registry"
src = "contracts/TgBtcCatDexRegistry.tolk"
depends = []

[test]

[fmt]
width = 100
ignore = []

[scripts]
deploy-emulation = "acton script scripts/deploy.tolk"
deploy-testnet = "acton script scripts/deploy.tolk --net testnet"

[import-mappings]
acton = ".acton"
contracts = "contracts"
gen = "gen"
tests = "tests"
wrappers = "wrappers"
